# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=PingMe-Core-Service
spring.threads.virtual.enabled=true
spring.jmx.enabled=false
server.port=8080
# ===============================================================
# INFRASTRUCTURE & DATA
# ===============================================================
## SQL - MariaDB
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.jpa.hibernate.ddl-auto=validate
## Caching - Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.client-type=lettuce
spring.cache.type=redis
spring.data.redis.repositories.enabled=false
## AWS S3 Storage
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECERT_KEY}
aws.region=${AWS_REGION}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.domain=${AWS_S3_DOMAIN}
# ===============================================================
# SPRING SECURITY
# ===============================================================
## JWT
app.jwt.secret=${JWT_SECRET}
## Cookie & CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
# ===============================================================
# WEB / MVC CONFIGURATION
# ===============================================================
## Swagger / Docs
springdoc.api-docs.enabled=false
springdoc.api-docs.version=openapi_3_0
springdoc.swagger-ui.enabled=false
## Pagination
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.max-page-size=20
## File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
## JSON Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# ===============================================================
# INTEGRATIONS
# ===============================================================
## Cloudflare Turnstile
cloudflare.turnstile.verify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify
# ===============================================================
# OBSERVABILITY (LOGS & HEALTH)
# ===============================================================
## Actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.status.http-mapping.UP=200
management.endpoint.health.status.http-mapping.DOWN=503
## Logging
logging.level.root=INFO
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# ===============================================================
# Resilience4j
# ===============================================================
## Chat Sending
resilience4j.ratelimiter.configs.chatSending.limit-for-period=5
resilience4j.ratelimiter.configs.chatSending.limit-refresh-period=3s
resilience4j.ratelimiter.configs.chatSending.timeout-duration=0
## Chat History
resilience4j.ratelimiter.configs.chatHistory.limit-for-period=50
resilience4j.ratelimiter.configs.chatHistory.limit-refresh-period=1s
resilience4j.ratelimiter.configs.chatHistory.timeout-duration=500ms
